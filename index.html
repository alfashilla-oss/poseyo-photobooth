<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Poseyo Photobooth</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<header>

<div class="logo">

<i class="bi bi-camera-fill"></i>

<h1>Poseyo Photobooth</h1>

</div>

<nav>

<button class="menu-btn">

<i class="bi bi-grid-fill"></i>

Dashboard

</button>

<button class="menu-btn">

<i class="bi bi-person-circle"></i>

Profil

</button>

<button class="menu-btn">

<i class="bi bi-gear-fill"></i>

Pengaturan

</button>

</nav>

</header>

<main class="dashboard">

<div class="left-panel">

<section class="welcome">

<h2>Selamat Datang 👋</h2>

<p>
Pilih template favoritmu kemudian mulai sesi photobooth.
</p>

</section>

<section class="template">

<h3>Template</h3>

<div class="template-card active"

data-frame="assets/frames/frame1.png"

data-preview="assets/previews/preview1.png">

<img src="assets/previews/preview1.png">

<p>Frame 1</p>

</div>

  <div class="template-card"

data-frame="assets/frames/frame2.png"

data-preview="assets/previews/preview2.png">

<img src="assets/previews/preview2.png">

<p>Frame 2</p>

</div>

  <div class="template-card"

data-frame="assets/frames/frame3.png"

data-preview="assets/previews/preview3.png">

<img src="assets/previews/preview3.png">

<p>Frame 3</p>

</div>

</section>

<section class="preview">

<h3>Preview</h3>

<div class="preview-box">

Preview Frame

</div>

</section>

</div>

<div class="right-panel">

<section>

<h3>Quick Actions</h3>

<button class="action-btn">

📸 Start Photobooth

</button>

<button class="action-btn">

⬆ Upload Template

</button>

<button class="action-btn">

⚙ Pengaturan Kamera

</button>

</section>

<section>

<h3>Status Slot</h3>

<div class="slot">⬜ Slot 1</div>

<div class="slot">⬜ Slot 2</div>

<div class="slot">⬜ Slot 3</div>

<div class="slot">⬜ Slot 4</div>

</section>

</div>

</main>

<script src="js/app.js"></script>

</body>

</html>
